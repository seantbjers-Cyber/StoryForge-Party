  passages: {

    // ═══════════════════════════════════════════

    start: {
      text: "West Bristol School's end-of-year party was the most exciting day of the whole entire year. Bouncy houses filled the playground, music blasted from the speakers, and kids were laughing and shouting everywhere. Jordan Bjers sat on a bench near the big oak tree, her first aid kit tucked neatly in her backpack, reading about how to treat a sprained wrist. She was the only first-grader she knew who carried a first aid kit — but someone had to be prepared, and that someone was always Jordan.",

    kellan_booboo: {
      text: "\"JORDAAAAAAN!\" Jordan's little brother Kellan came zooming around the corner at full speed. He had been bouncing so high on the bouncy house that he'd decided to try jumping off the side — which was exactly the kind of thing Kellan did. He skidded across the blacktop and landed on both knees. Jordan was already sprinting toward him, first aid kit swinging off her back. She cleaned the scrape and put on two bandaids — one dinosaur and one star, because Kellan always got to pick. \"You are going to be totally fine,\" she told him very seriously, like a real doctor. Kellan hopped straight back up — and pointed at something behind her. \"Jordan. Look.\"",

    spotted_them: {
      text: "Jordan turned around — and froze. Behind the snack table, three young women were doing a quiet rehearsal near the edge of the playground. They wore the most incredible outfits Jordan had ever seen. Jordan's mouth fell open so wide that Kellan poked her chin to close it. She knew those faces. She knew those voices. She had watched that movie six times. \"Kellan,\" she whispered, grabbing his arm so tight he squeaked. \"That's HUNTR/X.\" Then she saw it: a small shadow, the size of a cat, flickering low to the ground near Rumi's feet — and it was reaching for the silver locket around Rumi's neck. Jordan knew that locket. It was the voice locket, the one that glowed in the movie. Nobody else noticed the shadow. But Jordan did.",

    // ═══════════════════════════════════════════
    // BRANCH A: WARN RUMI
    // ═══════════════════════════════════════════

    warn_rumi: {
      text: "Jordan did not hesitate. She grabbed Kellan's hand and marched straight toward Rumi, her heart hammering so loud she could practically hear it. Rumi looked up, surprised — then looked more surprised, because it was a very small girl marching toward her with extreme purpose. \"Excuse me,\" Jordan said, and her voice only wobbled a tiny bit. \"I know this sounds really weird. But there is a shadow demon near your feet and I think it wants your locket.\" Rumi stared at her. Mira stifled a laugh. But Zoey stepped forward, squinting at the ground. \"Rumi,\" Zoey said slowly. \"Your locket is glowing.\"",

    // ── A1: SPEED KELLAN ──

    speed_kellan: {

    kellan_cuts_off: {

      text: "The West Bristol playground was quiet again. Mira sat on a bench with her ankle wrapped, staring at the bandage like she didn't fully believe a first-grader had done it. Rumi knelt down in front of Jordan until they were exactly eye to eye. \"Jordan,\" she said. \"HUNTR/X protects people with our voices, our strength — and our brains. But a good Hunter also knows how to heal.\" She reached into her jacket and held out a small silver badge shaped like a star. \"We've been looking for someone like you for a long time.\" Jordan took the badge with both hands. Her eyes went very wide. \"Does this mean—\" \"You're an official HUNTR/X recruit,\" said Rumi. \"As of right now.\" Behind Jordan, Kellan made the loudest celebratory noise that West Bristol School had ever heard.",

// ENGINE — do not edit below this line
// ══════════════════════════════════════════════════════════════
var HERO = STORY.heroName || "the hero";
var COLORS = ["#1A3A0F","#7C1D35","#1A2E5A"];
var cid = "start", hist = [], started = false;
var app = document.getElementById("app");
var endingCount = Object.values(STORY.passages).filter(function(p){return p.isEnding}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function go(id){hist.push(cid);cid=id;render();window.scrollTo({top:0,behavior:"smooth"});}
function back(){if(!hist.length)return;cid=hist.pop();render();window.scrollTo({top:0,behavior:"smooth"});}
function restart(){cid="start";hist=[];started=false;render();window.scrollTo({top:0,behavior:"smooth"});}
function begin(){started=true;render();}

function render(){
  if(!started){renderTitle();return;}
  var p=STORY.passages[cid];
  if(!p){app.innerHTML="<p>Oops! Something went wrong.</p>";return;}
  var isEnd=p.isEnding||!p.choices||!p.choices.length;
  var isSingle=!isEnd&&p.choices.length===1;
  var pg=hist.length+1;
  var totalEst=Object.keys(STORY.passages).length;
  var pct=Math.min(100,(hist.length/(totalEst*0.6))*100).toFixed(1);
  var img=IMAGES[cid]||"";
  var imgH=img
    ?'<div class="imgbox"><img src="'+esc(img)+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>'
    :'<div class="imgph"><div class="iph-i">&#128444;</div><div class="iph-t">Illustration coming soon</div></div>';
  var chH="";
  if(isEnd){
    chH='<div class="end-acts"><button class="btn-rs" onclick="restart()">&#8635; Start Over</button><button class="btn-bk" onclick="back()">&#8592; Go Back</button></div>';
  }else if(isSingle){
    chH='<button class="btn-cont" onclick="go(\''+esc(p.choices[0].next)+'\')">'+esc(p.choices[0].text)+'</button>';
  }else{
    var btns=p.choices.map(function(c,i){
      return '<button class="cbtn" style="background:'+COLORS[i%3]+'" onclick="go(\''+esc(c.next)+'\')"><span class="cnum">'+(i+1)+'</span>'+esc(c.text)+'</button>';
    }).join("");
    chH='<div class="clabel">What does '+esc(HERO)+' do?</div><div class="choices">'+btns+'</div>';
  }
  var bkBtn=(hist.length>0&&!isEnd)?'<button class="bnav" onclick="back()">&#8592;</button>':"";
  var chapLbl=(cid==="start")?'<div class="chap">'+esc(STORY.title)+'</div>':"";
  var endFt=isEnd?'<div class="endf"><div class="endstar">&#11088; The End &#11088;</div><div class="endnote">There are '+endingCount+' different endings &mdash; can you find them all?</div></div>':"";
  app.innerHTML='<div class="reader"><div class="topbar"><button class="bnav" onclick="restart()">&#127968;</button>'+bkBtn+'<div class="pw"><div class="stitle">'+esc(STORY.title)+'</div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div></div><div class="pbw"><div class="pb">'+pg+'</div></div>'+imgH+'<div class="scard">'+chapLbl+'<div class="stxt">'+esc(p.text)+'</div>'+endFt+'</div>'+chH+'</div>';
}

function renderTitle(){
  app.innerHTML='<div class="title-scr"><div class="tstar">&#11088;</div><div class="tlabel">A Choose Your Own Adventure Story</div><h1 class="ttitle">'+esc(STORY.title)+'</h1><div class="tdiv"></div><div class="tded">'+esc(STORY.dedication)+'</div><div class="thow"><strong>How to read:</strong> Pick the choice YOU would make. Each one leads somewhere different. There are '+endingCount+' endings — can you find them all?</div><button class="tbtn" onclick="begin()">&#10024; Begin the Adventure!</button></div>';
}

render();
</script>
